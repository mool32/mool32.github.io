- date: "Apr 2026"
  text: "[Universal statistical signatures of evolution in AI architectures](https://arxiv.org/abs/2604.10571) — preprint deposited on arXiv (2604.10571). 935 ablation experiments from 161 ML publications show that the DFE of architectural modifications matches biological DFEs."

