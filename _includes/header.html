<header class="site-header">
  <div class="site-header-inner">
    <a class="site-name" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="site-nav">
      {% for item in site.nav %}
        {%- assign current = false -%}
        {%- if page.url == item.url -%}{%- assign current = true -%}{%- endif -%}
        <a href="{{ item.url | relative_url }}"{% if current %} class="active"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
